upstream backend_production {
  server 127.0.0.1:3000;
}

upstream backend_staging {
  server 127.0.0.1:3001;
}

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 20m;

  location = /h5 {
    return 302 /h5/$is_args$args;
  }

  location /admin/ {
    alias /srv/backend/production/admin/dist/;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /h5/ {
    alias /srv/backend/production/h5/dist/;
    index index.html;
    try_files $uri $uri/ /h5/index.html;
  }

  location / {
    proxy_pass http://backend_production;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }
}

server {
  listen 8080;
  server_name _;

  client_max_body_size 20m;

  location = /h5 {
    return 302 /h5/$is_args$args;
  }

  location /admin/ {
    alias /srv/backend/staging/admin/dist/;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /h5/ {
    alias /srv/backend/staging/h5/dist/;
    index index.html;
    try_files $uri $uri/ /h5/index.html;
  }

  location / {
    proxy_pass http://backend_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }
}
